name: Collect headlines

# Runs three times a day. GitHub Actions cron is always in UTC and does NOT
# observe daylight saving, so these hours are fixed UTC times.
#   07:00, 13:00, 19:00 UTC
# For UK local time during BST (summer, UTC+1) that is 08:00, 14:00, 20:00.
# To pin to UK local morning/afternoon/evening in summer, use '0 6,12,18 * * *'.
on:
  schedule:
    - cron: "0 7,13,19 * * *"
  workflow_dispatch: {}

# Allow the job to push the updated database back to the repository.
permissions:
  contents: write

# Prevent overlapping runs from racing on the same commit/push.
concurrency:
  group: collect-headlines
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect headlines
        run: python collect_headlines.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # headlines.db is gitignored locally, so force-add it.
          git add -f headlines.db
          if git diff --staged --quiet; then
            echo "No new headlines; nothing to commit."
          else
            git commit -m "Update headlines.db ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
