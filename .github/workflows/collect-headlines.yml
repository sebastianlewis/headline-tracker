name: Collect headlines

# Runs three times a day, targeting UK local time (07:00, 13:00, 19:00).
# GitHub Actions cron is always UTC and does NOT observe daylight saving.
# These UTC hours match UK local time during BST (summer, UTC+1):
#   06:00, 12:00, 18:00 UTC -> 07:00, 13:00, 19:00 BST
# In winter (GMT, UTC+0) they will fire an hour earlier in local terms
# (06:00, 12:00, 18:00 GMT); bump each hour by 1 if you want to correct that.
on:
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch: {}

# Allow the job to push the updated database back to the repository.
permissions:
  contents: write

# Prevent overlapping runs from racing on the same commit/push.
concurrency:
  group: collect-headlines
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect headlines
        run: python collect_headlines.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # headlines.db is gitignored locally, so force-add it.
          git add -f headlines.db
          if git diff --staged --quiet; then
            echo "No new headlines; nothing to commit."
          else
            git commit -m "Update headlines.db ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
